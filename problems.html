<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker || Problems</title>
    <!-- daisy and tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- google fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
   <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- styles -->
     <style>
        *{
            font-family: "Geist", sans-serif;
        }
     </style>
     <!-- stylesheet -->
      <link rel="stylesheet" href="styles/style.css">
</head>
<body class="">
     <header class=" navbar bg-base-100 shadow-sm">
<div class="navbar max-w-[1400px] mx-auto">
  <div class="flex-1 flex items-center gap-3">
    <img src="assets/github-logo.png" alt="" class="w-[40px]">
    <h2 class=" text-xl font-bold">GitHub Issues Tracker</h2>
  </div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
     <button class="btn btn-primary">+ new issue</button>
  </div>
</div>

</header>
 <main class="max-w-[1200px] mx-auto">
     <section class="button-toggle-section shadow rounded p-5 space-x-4 mt-8 sm:mt-[50px]">
        <button onclick="toggleBtn('all-filter-btn')" class="btn btn-primary w-[80px]" id="all-filter-btn">All</button>
        <button onclick="toggleBtn('open-filter-btn')" class="btn  w-[80px]" id="open-filter-btn">Open</button>
        <button onclick="toggleBtn('close-filter-btn')" class="btn" id="close-filter-btn">Closed</button>

     </section>
     <section class="issues-count-section shadow rounded p-5 space-x-4 mt-4">
        <div class="flex justify-between items-center">
           <div class="flex gap-3 items-center">
              <div>
                <img src="assets/Aperture.png" alt="">
              </div>
              <div>
                <h2 class="text-xl font-bold"><span id="count-in-heading"></span> Issues</h2>
                <p class="text-[#64748B]">Track and manage your project issues</p>
              </div>
           </div>
           <div class="flex gap-5">
             <div class="flex gap-4 items-center">
                <div class="bg-[#00A96E] w-[12px] h-[12px] rounded-full"></div>
                <p>Open</p>
             </div>
             <div class="flex gap-4 items-center">
                <div class="bg-[#A855F7] w-[12px] h-[12px] rounded-full"></div>
                <p>Closed</p>
             </div>

           </div>

        </div>

     </section>
     

     <section class="all-issues-container grid gap-1 p-3 sm:grid-cols-4 sm:gap-4 mt-3" id="all-issues-container">
        

     </section>
     <section class="loading-spinnar flex justify-center items-center hidden " id="loading-spinnar">
       <span class="loading loading-bars loading-xl"></span>

     </section>

 </main>
   <script src="scripts/script.js"></script>  
</body>
</html>
