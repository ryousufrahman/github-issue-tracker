<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- daisy and tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- google fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
   <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- styles -->
     <style>
        *{
            font-family: "Geist", sans-serif;
        }
     </style>
     <!-- stylesheet -->
      <link rel="stylesheet" href="styles/style.css">
</head>
<body class="h-screen flex items-center">
    <div class="loging-box max-w-[520px] mx-auto p-8 card card-body  shadow-xl ">
         <div class="main-login-content">
           <div class="login-box-header text-center ">
             <img src="assets/github-logo.png" alt="" class="mx-auto mb-6">
              <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
             <p class="text-[#64748B]">Sign in to manage your issues</p>
         </div>
          <div class="form-box">
              <div class="form  mx-auto">
                  <div class="card bg-base-100 w-full   rounded-3xl">
                 <div class="card-body">
                <fieldset class="fieldset">
                 <label class="label  text-neutral font-bold">Username</label>
                <input type="text" id="login-name" class="input rounded-full bg-base-200 w-full" placeholder="Enter Username"/>
                <br>
                  <label class="label text-neutral font-bold">Password</label>
                 <input type="password" id="login-password" class="input rounded-full bg-base-200 w-full" placeholder="Enter Password"  />
          
                 <button id="sign-in-btn" class="btn btn-primary mt-4 rounded-lg">Sign In</button>
              </fieldset>
                  </div>
                 </div>

            </div>


         </div>

         <div class="or">
            <P class="text-center mb-4">OR</P>
            <p class="text-center text-[#707984]">Demo Credentials:</p>
            <div class="mt-3 bg-blue-50 rounded p-4">
                <p class="font-semibold text-center">Username: <span class="font-normal">admin</span></p>
                <p class="font-semibold text-center">Password: <span class="font-normal">admin123</span></p>
            </div>


         </div>


    </div>

 <script src="scripts/index.js"></script>   
</body>
</html>
